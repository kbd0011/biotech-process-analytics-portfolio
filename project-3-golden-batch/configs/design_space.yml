# Design space for Golden Batch Early Warning System
# Factor ranges, simulation priors, failure modes, and release criteria

factors:
  n_activations:
    range: [1, 3]
    default: 2
    type: integer
  seed_train_days:
    range: [2, 5]
    default: 3
    type: integer
  seeding_density_e6_ml:
    range: [0.5, 2.0]
    default: 1.0
    type: float
  il2_iu_ml:
    range: [50, 400]
    default: 200
    type: float
  feed_strategy:
    levels: ["bolus", "continuous"]
    default: "bolus"
  hold_time_hrs:
    range: [0, 12]
    default: 2
    type: float

trajectory_variables:
  - glucose_mm
  - lactate_mm
  - viable_cell_density_e6_ml
  - viability_pct
  - ph
  - do_pct
  - temperature_c
  - cumulative_feed_ml
  - potency_surrogate

process:
  duration_days: 10
  samples_per_day: 4
  noise_level: 0.05

donor_variability:
  cd3_pct: {mean: 65, std: 8}
  initial_viability: {mean: 92, std: 4}

site_effects:
  SITE_A: {bias: 0.0}
  SITE_B: {bias: -0.03}

failure_modes:
  over_activation:
    description: "Excessive activation leading to T-cell exhaustion"
    affected_vars: [viable_cell_density_e6_ml, viability_pct, potency_surrogate]
    trigger: "n_activations >= 3"
    severity: "major"
  nutrient_limitation:
    description: "Glucose depletion from inadequate feeding"
    affected_vars: [glucose_mm, lactate_mm, viable_cell_density_e6_ml]
    trigger: "feed_strategy == 'bolus' and seeding_density_e6_ml > 1.5"
    severity: "major"
  delayed_harvest:
    description: "Extended culture past optimal harvest window"
    affected_vars: [viability_pct, potency_surrogate]
    trigger: "hold_time_hrs > 8"
    severity: "minor"
  contamination_upset:
    description: "Contamination-like process upset causing rapid viability drop"
    affected_vars: [viability_pct, viable_cell_density_e6_ml, ph]
    trigger: "random_event"
    probability: 0.03
    severity: "critical"
  low_transduction:
    description: "Low transduction efficiency from poor vector quality"
    affected_vars: [potency_surrogate]
    trigger: "random_event"
    probability: 0.05
    severity: "major"

release_criteria:
  viability_min: 70.0
  vcd_min_e6_ml: 0.8
  potency_min: 20.0

monitoring:
  t2_confidence: 0.95
  spe_confidence: 0.95
  ewma_lambda: 0.2

early_prediction:
  horizons: [2, 5]
  target: "release_pass"

random_seed: 42
